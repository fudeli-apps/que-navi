function useCountdown(endTime) {
  const [min, setMin] = useState(() => remMin(endTime));
  useEffect(() => {
    const t = setInterval(() => setMin(remMin(endTime)), 10000);
    return () => clearInterval(t);
  }, [endTime]);
  return min;
}

        {timeLabel}
      </div>
      <div style={{fontSize:13,color:MUTED,marginTop:3,whiteSpace:"nowrap"}}>зөӮдәҶ {endTime}</div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   е ұй…¬гғ‘гғҚгғ«
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function RewardPanel({ q }) {
  const done     = q.done || 0;
  const rejected = q.rejected || 0;
  const total    = done + rejected;
  const compRate = total > 0 ? Math.round(done / total * 100) : 100;
  const rateThreshold = parseInt(q.completionRate || 0);
  const rateOk   = !rateThreshold || compRate >= rateThreshold;

  // в”Җв”Җ гғһгғ«гғҒгӮ№гғҶгғғгғ—еҜҫеҝң в”Җв”Җ
  const steps    = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
  const isMulti  = steps.length > 1;
  const bonusExt = parseInt(q.bonusExtra || 0);

  // еҗ„гӮ№гғҶгғғгғ—гҒ®йҒ”жҲҗзўәиӘҚгғ»зҙҜиЁҲе ұй…¬
  const earned = steps.filter(s=>done>=s.count).reduce((sum,s)=>sum+s.reward,0)
                 + (done>=q.goal && bonusExt && rateOk ? bonusExt : 0);
  const maxBonus = steps.reduce((sum,s)=>sum+s.reward,0) + bonusExt;
  const allOk    = done >= q.goal;

  if(isMulti) {
    return (
      <div style={{
        background: allOk ? "#051a05" : CARD,
        border: `1px solid ${allOk ? "#22c55e" : BDR}`,
        borderRadius: 10, padding: "10px 14px",
        boxShadow: allOk ? "0 0 20px #22c55e40" : "none",
        transition: "all 0.4s",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            {steps.map((s,i) => {
              const ok = done >= s.count;
              const stepCount = s.count - (i>0 ? steps[i-1].count : 0);
              return (
                <div key={i} style={{fontSize:17,color:ok?"#22c55e":MUTED,marginBottom:2,
                  display:"flex",justifyContent:"space-between"}}>
                  <span>{ok?"вң“":"в—Ҝ"} {i===0?stepCount:"+"+stepCount}д»¶йҒ”жҲҗ</span>
                  <span style={{fontWeight:700}}>ВҘ{s.reward.toLocaleString()}</span>
                </div>
              );
            })}
            {bonusExt > 0 && (
              <div style={{fontSize:17,color:allOk&&rateOk?"#22c55e":MUTED,marginBottom:2,
                display:"flex",justifyContent:"space-between"}}>
                <span>{allOk&&rateOk?"вң“":"в—Ҝ"} е®ҢдәҶзҺҮ{q.completionRate}%вҶ‘</span>
                <span style={{fontWeight:700}}>+ВҘ{bonusExt.toLocaleString()}</span>
              </div>
            )}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:900,lineHeight:1,
              color:allOk?"#22c55e":earned>0?"#fbbf24":MUTED,
              textShadow:allOk?"0 0 16px #22c55e":earned>0?"0 0 10px #fbbf24":"none"}}>
              ВҘ{earned.toLocaleString()}
            </div>
            <div style={{fontSize:13,color:MUTED}}>/ ВҘ{maxBonus.toLocaleString()}</div>
          </div>
        </div>
      </div>
    );
  }

  // в”Җв”Җ еҚҳдёҖгӮ№гғҶгғғгғ—пјҲгғӯгӮұгғғгғҲгғҠгӮҰзӯүпјүв”Җв”Җ
  const bonusBase = parseInt(steps[0]?.reward || 0);
  const goalOk    = done >= q.goal;
  const fullOk    = goalOk && (!bonusExt || rateOk);
  const earnedS   = goalOk ? bonusBase + (rateOk ? bonusExt : 0) : 0;

  return (
    <div style={{
      background: fullOk ? "#051a05" : CARD,
      border: `1px solid ${fullOk ? "#22c55e" : BDR}`,
      borderRadius: 10, padding: "10px 14px",
      boxShadow: fullOk ? "0 0 20px #22c55e40" : "none",
      transition: "all 0.4s",
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:17,color:goalOk?"#22c55e":MUTED,marginBottom:3}}>
            {goalOk?"вң“ ":"в—Ҝ "}{q.goal}д»¶йҒ”жҲҗ вҶ’ ВҘ{bonusBase.toLocaleString()}
          </div>
          {bonusExt > 0 && (
            <div style={{fontSize:17,color:fullOk?"#22c55e":MUTED}}>
              {fullOk?"вң“ ":"в—Ҝ "}е®ҢдәҶзҺҮ{q.completionRate}%д»ҘдёҠ вҶ’ +ВҘ{bonusExt.toLocaleString()}
            </div>
          )}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:26,fontWeight:900,lineHeight:1,
            color:fullOk?"#22c55e":MUTED,
            textShadow:fullOk?"0 0 16px #22c55e":"none"}}>
            ВҘ{earnedS.toLocaleString()}
          </div>
          <div style={{fontSize:13,color:MUTED}}>/ ВҘ{(bonusBase+bonusExt).toLocaleString()}</div>
        </div>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   гӮҜгӮЁгӮ№гғҲгӮ«гғјгғү
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function QuestCard({ q, me, onUpdate, onDelete, onCopy, onEdit, onMove, questIdx, questCount }) {
  const svc      = SVC[q.service] || SVC.rocket;
  const done     = q.done || 0;
  const rejected = q.rejected || 0;
  const goal     = q.goal || 1;
  const achieved = done >= goal;
  const total    = done + rejected;
  const compRate = total > 0 ? Math.round(done / total * 100) : 100;
  const rateThreshold = parseInt(q.completionRate || 0);
  const rateOk   = !rateThreshold || compRate >= rateThreshold;

  // в”Җв”Җ гғһгғ«гғҒгӮ№гғҶгғғгғ—: ж¬ЎгҒ®гӮ№гғҶгғғгғ—гҒҫгҒ§гҒ®ж®ӢгӮҠд»¶ж•° в”Җв”Җ
  const steps       = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
  const currentStep = steps.find(s => s.count > done);       // ж¬ЎгҒ®жңӘйҒ”гӮ№гғҶгғғгғ—
  const prevStep    = [...steps].reverse().find(s=>s.count<=done); // зӣҙеүҚгҒ®йҒ”жҲҗжёҲгҒҝ
  const nextGoal    = currentStep ? currentStep.count : goal;
  const prevCount   = prevStep ? prevStep.count : 0;
  const left        = Math.max(0, nextGoal - done);
  // зҸҫеңЁгӮ№гғҶгғғгғ—еҶ…гҒ®йҖІжҚ—
  const stepRange   = nextGoal - prevCount;
  const pct         = stepRange > 0
    ? Math.min(100, Math.round((done - prevCount) / stepRange * 100))
    : 100;
  const stepLabel   = steps.length > 1
    ? `гӮ№гғҶгғғгғ—${steps.filter(s=>s.count<=done).length+1}/${steps.length}`
    : null;

  return (
    <div style={{
      background: CARD,
      borderRadius: 16,
      border: `1px solid ${svc.color}50`,
      borderLeft: `5px solid ${svc.color}`,
      boxShadow: `0 4px 24px ${svc.color}18`,
    }}>

      {/* в”Җ гғҳгғғгғҖгғј в”Җ */}
      <div style={{
        padding: "12px 14px 6px",
        display: "flex", justifyContent: "space-between",
        alignItems: "center", gap: 8,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0,overflow:"hidden"}}>
          <span style={{
            background: svc.dark,
            color: svc.color,
            border: `1px solid ${svc.color}`,
            borderRadius: 6,
            padding: "3px 8px",
            fontSize: 12, fontWeight: 800, flexShrink: 0,
            boxShadow: `0 0 8px ${svc.color}50`,
          }}>
            {svc.icon} {svc.label}
          </span>
          <span style={{
            fontSize: 11, color: MUTED,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>{q.owner}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {achieved && (
            <span style={{fontSize:17,fontWeight:800,color:"#22c55e",
              textShadow:"0 0 10px #22c55e"}}>вң“ йҒ”жҲҗпјҒ</span>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:2,marginLeft:2}}>
            <button onClick={()=>onMove&&onMove(q.id,-1)} disabled={questIdx==null||questIdx===0}
              style={{background:"none",border:"none",color:(questIdx==null||questIdx===0)?"#1e293b":"#94a3b8",fontSize:18,cursor:(questIdx==null||questIdx===0)?"default":"pointer",padding:"2px 4px",lineHeight:1}}>в–І</button>
            <button onClick={()=>onMove&&onMove(q.id,1)} disabled={questIdx==null||questIdx===questCount-1}
              style={{background:"none",border:"none",color:(questIdx==null||questIdx===questCount-1)?"#1e293b":"#94a3b8",fontSize:18,cursor:(questIdx==null||questIdx===questCount-1)?"default":"pointer",padding:"2px 4px",lineHeight:1}}>в–ј</button>
          </div>
          {me===q.owner && !achieved && (
            <><button onClick={() => onEdit && onEdit(q)} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer",padding:"2px 4px"}} style={{fontSize:17,fontWeight:700}}>з·ЁйӣҶ</button><button onClick={() => onCopy && onCopy(q)} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer",padding:"2px 4px"}} style={{fontSize:17,fontWeight:700}}>гӮігғ”гғј</button></>
          )}
          <button onClick={() => {
            if(!confirm("еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ")) return;
            onDelete(q.id);
          }} style={{
            background:"none",border:"none",color:"#475569",
            fontSize:17,cursor:"pointer",padding:"0 4px",
          }}>вң•</button>
        </div>
      </div>

      {/* в”Җ ж—Ҙд»ҳгғ»жҷӮй–“ в”Җ */}
      <div style={{
        padding: "0 14px 10px",
        fontSize: 14, color: MUTED,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>
        {q.date && (
          <span style={{color:BLUE,marginRight:6,fontWeight:600}}>
            {fmtDate(q.date)}{q.dateTo ? `гҖң${fmtDate(q.dateTo)}` : ""}
          </span>
        )}
        рҹ•җ {q.startTime} гҖң {q.endTime}
        {q.acceptWindow && (
          <span style={{marginLeft:8,color:"#475569"}}>еҸ—и«ҫеҸҜ: {q.acceptWindow}</span>
        )}
      </div>

      {/* в”Җ з· еҲҮгӮўгғ©гғјгғҲ в”Җ */}
      {q.deadline && (
        <div style={{padding:"0 14px 4px"}}>
          <DeadlineBadge time={q.deadline} label="еҲқеӣһеҸ—жіЁз· еҲҮ" firstOrderDone={done>=1}/>
        </div>
      )}

      {/* в”Җ гғЎгӮӨгғігӮ«гӮҰгғігӮҝгғј в”Җ */}
      <div style={{
        display: "flex", alignItems: "center",
        background: "#060a10",
        padding: "16px 14px", gap: 14,
      }}>
        {/* ж®ӢгӮҠд»¶ж•° */}
        <div style={{flexShrink:0,textAlign:"center",minWidth:64}}>
          <div style={{
            fontSize: achieved ? 38 : 52,
            fontWeight: 900, lineHeight: 1,
            color: achieved ? "#22c55e" : left<=2 ? "#ef4444" : BLUE,
            textShadow: achieved
              ? "0 0 24px #22c55e"
              : left<=2 ? "0 0 24px #ef4444"
              : `0 0 24px ${BLUE}`,
          }}>
            {achieved ? "вң“" : Math.max(0, done - prevCount)}
          </div>
          <div style={{fontSize:17,color:MUTED,marginTop:4}}>
            {achieved ? "йҒ”жҲҗ" : "/" + (nextGoal-prevCount) + "д»¶"}
          </div>
          {stepLabel && !achieved && (
            <div style={{
              fontSize:13,color:svc.color,marginTop:3,fontWeight:700,
              textShadow:`0 0 6px ${svc.color}`,
            }}>{stepLabel}</div>
          )}
        </div>

        {/* пјӢ / пјҚ гғңгӮҝгғі */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>
          <button
            onClick={() => !achieved && onUpdate(q.id,"done",1)}
            style={{
              width: "100%", maxWidth: 110, height: 54,
              borderRadius: 12, border: "none",
              background: achieved
                ? "#1e293b"
                : "#3b82f6",
              color: "#fff", fontSize: 28, fontWeight: 900,
              cursor: achieved ? "default" : "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: achieved
                ? "none"
                : "0 4px 16px #3b82f660, 0 0 24px #3b82f640",
            }}
          >пјӢ</button>
          <button
            onClick={() => onUpdate(q.id,"done",-1)}
            style={{
              width: 56, height: 32, borderRadius: 8, border: "none",
              background: "#1e293b", color: MUTED, fontSize: 18,
              cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >пјҚ</button>
        </div>

        {/* зөӮдәҶгҒҫгҒ§ */}
        <div style={{flexShrink:0,width:84}}>
          <EndBadge endTime={q.endTime} startTime={q.startTime}/>
        </div>
      </div>

      {/* в”Җ гғ—гғӯгӮ°гғ¬гӮ№гғҗгғј в”Җ */}
      <div style={{height:4,background:"#060a10"}}>
        <div style={{
          height: "100%",
          width: `${pct}%`,
          background: achieved
            ? "linear-gradient(90deg,#16a34a,#22c55e)"
            : `linear-gradient(90deg,${svc.color}80,${svc.color})`,
          transition: "width 0.5s ease",
          boxShadow: `0 0 8px ${achieved?"#22c55e":svc.color}`,
        }}/>
      </div>

      {/* в”Җ е®ҢдәҶзҺҮ & жӢ’еҗҰд»¶ж•°пјҲгғӯгӮұгғғгғҲгғҠгӮҰпјү в”Җ */}
      {q.service==="rocket" && q.completionRate && (
        <div style={{background:"#060a10",padding:"10px 14px"}}>
          <div style={{
            display:"flex",alignItems:"center",
            justifyContent:"space-between",gap:10,flexWrap:"wrap",
          }}>
            {/* жӢ’еҗҰгӮ«гӮҰгғігӮҝгғј */}
            <div style={{display:"flex",alignItems:"center",gax:8}}>
              <span style={{fontSize:17,color:MUTED,flexShrink:0}}>жӢ’еҗҰд»¶ж•°</span>
              <button onClick={() => onUpdate(q.id,"rejected",-1)} style={{
                background:"#1e293b",border:"none",color:MUTED,
                borderRadius:6,width:28,height:28,fontSize:17,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              }}>пјҚ</button>
              <span style={{
                fontSize:18,fontWeight:800,color:"#fb923c",
                minWidth:24,textAlign:"center",
                textShadow:"0 0 10px #fb923c70",
              }}>{rejected}</span>
              <button onClick={() => onUpdate(q.id,"rejected",1)} style={{
                background:"#7c2d12",border:"none",color:"#fb923c",
                borderRadius:6,width:28,height:28,fontSize:17,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              }}>пјӢ</button>
            </div>
            {/* е®ҢдәҶзҺҮ */}
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:17,color:MUTED,whiteSpace:"nowrap"}}>
                е®ҢдәҶзҺҮ (зӣ®жЁҷ{q.completionRate}%вҶ‘)
              </span>
              <span style={{
                fontSize:18,fontWeight:900,
                color: rateOk ? "#22c55e" : "#ef4444",
                whiteSpace:"nowrap",
                textShadow: rateOk ? "0 0 12px #22c55e" : "0 0 12px #ef4444",
              }}>
                {compRate}%{rateOk?" вң“":" вң—"}
              </span>
            </div>
          </div>
          {/* е®ҢдәҶзҺҮгғҗгғј */}
          <div style={{marginTop:8,height:3,background:"#1e293b",borderRadius:4}}>
            <div style={{
              height:"100%",
              width:`${Math.min(100,compRate)}%`,
              background: rateOk ? "#22c55e" : "#ef4444",
              borderRadius:4,
              boxShadow: rateOk ? "0 0 6px #22c55e" : "0 0 6px #ef4444",
              transition:"width 0.3s",
            }}/>
          </div>
        </div>
      )}

      {/* в”Җ е ұй…¬гғ‘гғҚгғ« в”Җ */}
      {(q.bonusExtra || (q.bonuses && q.bonuses.length > 1)) && (
        <div style={{padding:"10px 14px 4px"}}>
          <RewardPanel q={q}/>
        </div>
      )}

      {/* в”Җ гғ•гғғгӮҝгғј в”Җ */}
      <div style={{
        padding:"8px 14px",
        display:"flex",justifyContent:"space-between",alignItems:"center",
        borderTop:`1px solid ${BDR}`,
      }}>
        <span style={{fontSize:17,color:MUTED}}>{done}/{goal}д»¶ ({Math.min(100,Math.round(done/goal*100))}%)</span>
        <span style={{fontSize:17,color:"#475569"}}>{timeAgo(q.updatedAt)}</span>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   жӯЈиҰҸиЎЁзҸҫгғ‘гғјгӮөгғј
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

function Lbl({ children }) {
  return (
    <div style={{fontSize:17,color:MUTED,fontWeight:600,marginBottom:6}}>
      {children}
    </div>
  );
}

function Field({ label, type, val, set, placeholder }) {
  return (
    <div style={{minWidth:0,marginBottom:12}}>
      <Lbl>{label}</Lbl>
      <input
        type={type}
        style={INP}
        value={val}
        onChange={e => set(e.target.value)}
        placeholder={placeholder}
        min={type==="number" ? 0 : undefined}
      />
    </div>
  );
}

function Row2({ children }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "1fr 1fr",
      gap: 12,
      marginBottom: 12,
    }}>
      {children}
    </div>
  );
}

function SecHead({ children }) {
  return (
    <div style={{
      fontSize:17,fontWeight:700,color:MUTED,
      margin:"4px 0 8px",letterSpacing:"0.04em",
    }}>
      {children}
    </div>
  );
}

/* ж•°еҖӨгӮ№гғҶгғғгғ‘гғјпјҲеӨ§гҒҚгҒ„гғңгӮҝгғіпјӢгғ—гғӘгӮ»гғғгғҲпјү */
function NumStepper({ label, val, set, step=1, min=0, max=9999, presets }) {
  const n = parseInt(val) || 0;
  const up   = () => set(String(Math.min(max, n + step)));
  const down = () => set(String(Math.max(min, n - step)));
  const SB = { // stepper button
    border:"none", borderRadius:10, cursor:"pointer",
    width:44, height:44, fontSize:22, fontWeight:900,
    display:"flex", alignItems:"center", justifyContent:"center",
    flexShrink:0,
  };
  return (
    <div style={{minWidth:0, marginBottom:12}}>

function CounterPanel({ quests, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const activeQuests = quests.filter(q => (q.done||0) < q.goal);

  // зўәе®ҡе ұй…¬иЁҲз®—
  const confirmedReward = quests.reduce((sum, q) => {
    const done = q.done || 0;
    const steps = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
    const stepEarned = steps.filter(s => done >= s.count).reduce((s,b)=>s+b.reward,0);
    const allDone = steps.length > 0 && done >= steps[steps.length-1].count;
    const bExtra = allDone ? parseInt(q.bonusExtra||0) : 0;
    return sum + stepEarned + bExtra;
  }, 0);
  const totalDone = quests.reduce((s,q)=>s+(q.done||0),0);

  // гӮөгғһгғӘгғјгғўгғјгғҖгғ«
  const SummaryModal = () => {
    const hourMap = {};
    quests.forEach(q => {
      const lg = q.deliveryLog||[];
      lg.forEach(entry => {
        const hh = new Date(entry.at).getHours();
        hourMap[hh] = (hourMap[hh]||0) + 1;
      });
    });
    const hours = Object.keys(hourMap).sort((a,b)=>+a-+b);
    const maxC = Math.max(...Object.values(hourMap), 1);
    const svcColor = {"ubereats":"#00FF00","demae":"#FF0000","rocketnow":"#FF8C00"};
    return (
      <div onClick={()=>setShowSummary(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

}

function ScrollTopBtn() {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const onScroll = () => setVis(window.scrollY > 200);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);

  if(!vis) return null;
  return (
    <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})}
      style={{position:'fixed',bottom:84,left:16,zIndex:60,
        background:'#1e293b',border:'1px solid #334155',

        alignItems:'center',justifyContent:'center',

    </button>
  );
}

function App() {
  const [quests,  setQuests]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [me,      setMe]      = useState(() => localStorage.getItem("qt_name")||"гғ©гӮӨгғҖгғј");
  const [nameIn,  setNameIn]  = useState("");
  const [showForm,setShowForm]= useState(false);
  const [hideCompleted,setHideCompleted]=useState(false);
  const [activeTab,setActiveTab]=useState('active');
  const [showOcr,setShowOcr]=useState(false);
  const [ocrState,setOcrState]=useState({status:'idle',text:'',progress:0});
  
  const parseOcrText=(text)=>{
      if(!text)return {};
      const t=text.replace(/\s+/g,' ');
      const raw=text;
      const out={raw};
      // Service detection
      if(/Uber\s*Eats|гӮҰгғјгғҗгғј(гӮӨгғјгғ„)?|гӮҰгғјгғҗ/i.test(t))out.service='ubereats';
      else if(/гғӯгӮұгғғгғҲ\s*гғҠгӮҰ|Rocket\s*Now|гғӯгӮұгғҠгӮҰ/i.test(t))out.service='rocket';
      else if(/еҮәеүҚйӨЁ|гҒ§гҒҫгҒҲгҒӢгӮ“|еҮәеүҚ\s*йӨЁ/i.test(t))out.service='demae';
      else if(/\d+\s*еӣһ\s*гҒ®\s*д№—и»Ҡ|еӣһгҒ®д№—и»Ҡ/.test(t))out.service='ubereats';
      else if(/гғҹ\s*гғғ\s*гӮ·\s*гғ§\s*гғі\s*и©і\s*зҙ°|й…Қ\s*йҒ”\s*е®Ң\s*дәҶ\s*зҺҮ|еҲқ\s*еӣһ\s*еҸ—\s*и«ҫ\s*еҝ…\s*иҰҒ|д»¶\s*йҒ”\s*жҲҗ\s*жҷӮ|ж®Ӣ\s*гӮҠ\s*\d+\s*д»¶/.test(t))out.service='rocket';
      else if(/еҜҫ\s*иұЎ\s*гӮЁгғӘгӮў|еҜҫ\s*иұЎ\s*жҷӮ\s*й–“\s*еёҜ|й…Қ\s*йҒ”\s*д»¶\s*ж•°|йғҪ\s*йҒ“\s*еәң\s*зңҢ/.test(t))out.service='demae';
      // Count extraction
      const countMatches=[...t.matchAll(/(\d+)\s*[д»¶й…Қеӣһ]/g)].map(m=>parseInt(m[1])).filter(n=>n>0&&n<100);
      if(countMatches.length>0){
        out.goalCount=Math.max(...countMatches);
        out.allCounts=[...new Set(countMatches)].sort((a,b)=>a-b);
      }
      // Money extraction
      const yenMatches=[...t.matchAll(/[+пјӢ]?\s*[ВҘпҝҘ\\]\s*(\d[\d,.]*)|(\d[\d,.]*)\s*еҶҶ/g)].map(m=>parseInt((m[1]||m[2]).replace(/[,.]/g,''))).filter(n=>n>=100&&n<=200000);
      if(yenMatches.length>0){
        out.rewards=[...new Set(yenMatches)].sort((a,b)=>a-b);
        out.totalReward=Math.max(...yenMatches);
      }
      // Time extraction
      const timeMatch1=t.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*[-гҖң~пҪһвҖ“вҖҰгҒё][\s\S]{0,30}?(\d{1,2}):(\d{2})/);
      if(timeMatch1){
        out.startTime=timeMatch1[1].padStart(2,'0')+':'+timeMatch1[2];
        out.endTime=timeMatch1[3].padStart(2,'0')+':'+timeMatch1[4];
      }
      if(!out.startTime){
        const jp=t.match(/еҚҲ(еүҚ|еҫҢ)\s*(\d{1,2})\s*жҷӮ\s*(\d{1,2})?\s*еҲҶ?/);
        if(jp){
          let h=parseInt(jp[2]);
          if(jp[1]==='еҫҢ'&&h<12)h+=12;
          out.startTime=String(h).padStart(2,'0')+':'+(jp[3]?jp[3].padStart(2,'0'):'00');
        }
      }
      // Date extraction
      const dateJP=t.match(/(\d{1,2})\s*жңҲ\s*(\d{1,2})\s*ж—Ҙ/);
      const dateSlash=t.match(/(\d{1,2})\/(\d{1,2})(?!\d)/);
      const dateDot=t.match(/(\d{2})\.(\d{2})/);
      if(dateJP)out.date=dateJP[1].padStart(2,'0')+'/'+dateJP[2].padStart(2,'0');
      else if(dateSlash)out.date=dateSlash[1].padStart(2,'0')+'/'+dateSlash[2].padStart(2,'0');
      else if(dateDot)out.date=dateDot[1]+'/'+dateDot[2];
      return out;
    };
  
    // OCR (Tesseract.js dynamic load)
  const runOcrOnFile=async(file)=>{
    if(!file)return;
    setOcrState({status:'loading',text:'OCRгӮЁгғігӮёгғіиӘӯиҫјдёӯвҖҰ',progress:0});
    try{
      if(!window.Tesseract){
        await new Promise((resolve,reject)=>{
          const s=document.createElement('script');
          s.src='https://unpkg.com/tesseract.js@5/dist/tesseract.min.js';
          s.onload=resolve; s.onerror=reject;
          document.head.appendChild(s);
        });
      }
      setOcrState({status:'loading',text:'ж—Ҙжң¬иӘһиӘҚиӯҳдёӯвҖҰ',progress:10});
      const worker=await window.Tesseract.createWorker('jpn',1,{
        logger:m=>{
          if(m.status==='recognizing text'){
            setOcrState({status:'loading',text:'иӘҚиӯҳдёӯвҖҰ '+Math.round(m.progress*100)+'%',progress:m.progress*100});
          }
        }
      });
      const r=await worker.recognize(file);
      await worker.terminate();
      const parsedData=parseOcrText(r.data.text||'');setOcrState({status:'done',text:r.data.text||'(иӘҚиӯҳзөҗжһңгҒӘгҒ—)',progress:100,parsed:parsedData});
    }catch(e){
      setOcrState({status:'error',text:'гӮЁгғ©гғј: '+e.message,progress:0});
    }
  };
  const [showSettings,setShowSettings]=useState(false);

  const [spinning,setSpinning]=useState(false);

  const [svc,     setSvc]     = useState("ubereats");
  const [enabledSvc, setEnabledSvc] = useState(() => {
    try { return {...{rocket:true,demae:true,ubereats:true}, ...JSON.parse(localStorage.getItem("qt_services")||"{}")}; }
    catch { return {rocket:true,demae:true,ubereats:true}; }
  });
  function copyDailyReport(){var qs9=JSON.parse(localStorage.getItem("qt5")||"[]");var d9=new Date().toLocaleDateString("ja-JP");var out=["рҹҡҡ гӮҜгӮЁNavi "+d9];var t9=0;qs9.forEach(function(q){var dn=q.done||0;var sp=[].concat(q.bonuses||[]).sort(function(a,b){return a.count-b.count;});var rr=sp.filter(function(s){return dn>=s.count;}).reduce(function(s,b){return s+b.reward;},0);var ad=sp.length>0&&dn>=sp[sp.length-1].count;var bx=ad?parseInt(q.bonusExtra||0):0;t9+=rr+bx;out.push("вҖў "+q.service+" "+dn+"/"+q.goal+"д»¶ пҝҘ"+(rr+bx).toLocaleString());});out.push("еҗҲиЁҲ пҝҘ"+t9.toLocaleString());try{navigator.clipboard.writeText(out.join(String.fromCharCode(10))).then(function(){alert("гӮігғ”гғје®ҢдәҶ!");}).catch(function(){alert(out.join(String.fromCharCode(10)));});}catch(e){alert(out.join(String.fromCharCode(10)));}
  }
  const toggleSvc = (key) => {
    const count = Object.values(enabledSvc).filter(Boolean).length;
    if(enabledSvc[key] && count <= 1) return; // жңҖдҪҺ1гҒӨгҒҜж®ӢгҒҷ
    const updated = {...enabledSvc, [key]: !enabledSvc[key]};
    setEnabledSvc(updated);
    localStorage.setItem("qt_services", JSON.stringify(updated));
    // з„ЎеҠ№еҢ–гҒ•гӮҢгҒҹгӮөгғјгғ“гӮ№гҒҢйҒёжҠһдёӯгҒӘгӮүеҲҮгӮҠжӣҝгҒҲ
    if(svc===key && enabledSvc[key]) {
      const next = Object.entries(updated).find(([k,v])=>v&&k!==key);
      if(next) setSvc(next[0]);
    }
  };
  const [prefill, setPrefill] = useState(null);
  const [lastUp,  setLastUp]  = useState(null);

  useEffect(() => {
    const total = quests.reduce((s,q)=>s+(q.done||0),0);
    if('setAppBadge' in navigator) navigator.setAppBadge(total).catch(()=>{});
  }, [quests]);

  // иҮӘеӢ•жӣҙж–°гӮҝгӮӨгғһгғј
  useEffect(()=>{
    if(!autoReload) return;
    const iv=setInterval(()=>reload(),autoReload*1000);

 <script>(function(){
  if(window.__qneLoaded)return;
  window.__qneLoaded=true;
  
  // еҲқжңҹгғҶгғјгғһйҒ©з”Ё (localStorage е„Әе…ҲгҖҒгҒӘгҒ‘гӮҢгҒ°жҷӮеҲ»гҒ§еҲӨе®ҡ)
  function applyInitial(){
    var saved=null;
    try{saved=localStorage.getItem('qne_theme');}catch(e){}
    var isLight;
    if(saved==='light')isLight=true;
    else if(saved==='dark')isLight=false;
    else{var h=new Date().getHours();isLight=h>=6&&h<18;}
    if(isLight)document.body.classList.add('light-mode');
    else document.body.classList.remove('light-mode');
  }
  
  // гӮўгғ©гғјгғҲй–ҫеҖӨ еҲқжңҹеҢ– (еҲҶзөҰгғ»жҷӮзөҰгҒ®дёӢйҷҗ)
  try{
    if(!localStorage.getItem('alert_threshold_v1')){
      localStorage.setItem('alert_threshold_v1',JSON.stringify({minYenPerHour:1500,minYenPerMin:25,enabled:false,vibrate:true,sound:false}));
    }
  }catch(e){}
  
  // patch.js гҒ® qDayNightBtn гӮ’еҫ…гҒЈгҒҰclick hook
  function hookBtn(){
    var btn=document.getElementById('qDayNightBtn');
    if(!btn){setTimeout(hookBtn,200);return;}
    if(btn.__lightModeHooked)return;
    btn.__lightModeHooked=true;
    btn.onclick=function(){
      document.body.classList.toggle('light-mode');
      var isLight=document.body.classList.contains('light-mode');
      btn.textContent=isLight?'рҹҢҷ':'вҳҖпёҸ';
      try{document.documentElement.style.filter='';}catch(e){}
      try{localStorage.setItem('qne_theme',isLight?'light':'dark');}catch(e){}
    };
    var isLight=document.body.classList.contains('light-mode');
    btn.textContent=isLight?'рҹҢҷ':'вҳҖпёҸ';
    try{document.documentElement.style.filter='';}catch(e){}
  }
  
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){applyInitial();hookBtn();});
  }else{
    applyInitial();hookBtn();
  }
})();</script><script src="patch.js?v=23"></script>
